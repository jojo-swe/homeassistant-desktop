name: Build/release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build & release macOS
        if: runner.os == 'macOS'
        run: npx electron-builder --x64 --arm64 ${{ startsWith(github.ref, 'refs/tags/v') && '--publish always' || '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & release Windows
        if: runner.os == 'Windows'
        run: npx electron-builder --x64 ${{ startsWith(github.ref, 'refs/tags/v') && '--publish always' || '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & release Linux
        if: runner.os == 'Linux'
        run: npx electron-builder --linux AppImage --x64 ${{ startsWith(github.ref, 'refs/tags/v') && '--publish always' || '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
