name: Build/release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build (electron-vite)
        run: npm run build:dir

      - name: Set publish flag
        id: publish
        run: echo "flag=--publish always" >> $GITHUB_OUTPUT
        if: startsWith(github.ref, 'refs/tags/v')

      - name: Build & release macOS
        if: runner.os == 'macOS'
        run: npm run build:dir && npx electron-builder --mac --x64 --arm64 ${{ steps.publish.outputs.flag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""

      - name: Build & release Windows
        if: runner.os == 'Windows'
        run: npm run build:dir && npx electron-builder --win --x64 ${{ steps.publish.outputs.flag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools dpkg rpm fakeroot

      - name: Build & release Linux
        if: runner.os == 'Linux'
        run: npm run build:dir && npx electron-builder --linux AppImage deb rpm --x64 ${{ steps.publish.outputs.flag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
