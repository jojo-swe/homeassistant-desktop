name: Build beta binaries

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate source
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  build:
    name: Build ${{ matrix.name }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            arch: x64
            artifact: windows-x64
          - name: Windows ARM64
            os: windows-latest
            arch: arm64
            artifact: windows-arm64
          - name: macOS Intel
            os: macos-15-intel
            arch: x64
            artifact: macos-x64
          - name: macOS Apple Silicon
            os: macos-15
            arch: arm64
            artifact: macos-arm64
          - name: Linux x64
            os: ubuntu-latest
            arch: x64
            artifact: linux-x64
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            arch: arm64
            artifact: linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools dpkg rpm fakeroot

      - name: Build application
        run: npm run build:dir

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: npx electron-builder --win nsis zip portable --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package macOS
        if: runner.os == 'macOS'
        run: npx electron-builder --mac dmg zip --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package Linux
        if: runner.os == 'Linux'
        run: npx electron-builder --linux AppImage deb rpm --${{ matrix.arch }} --publish never

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: home-assistant-desktop-${{ matrix.artifact }}-${{ github.sha }}
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.yml
            dist/*.yaml
            dist/*.blockmap
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub beta release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: home-assistant-desktop-*
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release-assets/**
